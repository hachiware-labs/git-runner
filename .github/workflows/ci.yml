name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NATS_SERVER_VERSION: v2.10.25
      NATS_SERVER_PATH: /tmp/nats-server/nats-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install NATS server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/nats-server
          curl -fsSL "https://github.com/nats-io/nats-server/releases/download/${NATS_SERVER_VERSION}/nats-server-${NATS_SERVER_VERSION#v}-linux-amd64.tar.gz" -o /tmp/nats-server.tar.gz
          tar -xzf /tmp/nats-server.tar.gz -C /tmp/nats-server --strip-components=1
          "${NATS_SERVER_PATH}" --version

      - name: Check syntax
        run: npm run check

      - name: Run local contract tests
        run: npm run test:local

      - name: Run full test suite
        run: npm test
